services:
  postgres:
    image: postgres:16-alpine
    container_name: ltd2-coach-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ltd2}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ltd2_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-ltd2_coach}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-ltd2} -d ${POSTGRES_DB:-ltd2_coach}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ltd2-coach-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
    name: ltd2-coach-postgres-data
  redis_data:
    name: ltd2-coach-redis-data
